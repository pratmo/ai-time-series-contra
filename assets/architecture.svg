<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" role="img" aria-labelledby="archtitle archdesc">
  <title id="archtitle">Contrarian forecasting system architecture</title>
  <desc id="archdesc">System block diagram showing BAX data flowing through two parallel feature paths — standard price preprocessing and contrarian pattern engineering — into a hybrid CNN-LSTM model, producing a baseline forecast and a contrarian forecast for comparison.</desc>
  <defs>
    <style>
      .b { fill: #fff; stroke: #94a3b8; stroke-width: 1; }
      .teal { fill: #ecfeff; stroke: #06b6d4; }
      .coral { fill: #fff1f2; stroke: #f43f5e; }
      .gray { fill: #f8fafc; stroke: #94a3b8; }
      .th { font: 600 15px system-ui, -apple-system, sans-serif; fill: #0f172a; }
      .ts { font: 13px system-ui, -apple-system, sans-serif; fill: #475569; }
      .arr { stroke: #64748b; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="b gray" x="200" y="30" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="56" text-anchor="middle">Input data</text>
  <text class="ts" x="340" y="74" text-anchor="middle">BAX index — OHLCP, 15 years daily</text>

  <path d="M340 86 V108 H180 V130" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 86 V108 H500 V130" class="arr" marker-end="url(#arrow)"/>

  <rect class="b teal" x="40" y="130" width="280" height="70" rx="8"/>
  <text class="th" x="180" y="162" text-anchor="middle">Price preprocessing</text>
  <text class="ts" x="180" y="182" text-anchor="middle">Scale to [0,1], build windows</text>

  <rect class="b coral" x="360" y="130" width="280" height="70" rx="8"/>
  <text class="th" x="500" y="162" text-anchor="middle">Contrarian feature engineering</text>
  <text class="ts" x="500" y="182" text-anchor="middle">Pattern from t-2, t-1 candles</text>

  <path d="M180 200 V222 H300 V240" class="arr" marker-end="url(#arrow)"/>
  <path d="M500 200 V222 H380 V240" class="arr" marker-end="url(#arrow)"/>

  <rect class="b gray" x="120" y="240" width="440" height="70" rx="8"/>
  <text class="th" x="340" y="272" text-anchor="middle">Multichannel sample builder</text>
  <text class="ts" x="340" y="292" text-anchor="middle">60 days × 12 channels (price + 11 patterns)</text>

  <line x1="340" y1="310" x2="340" y2="350" class="arr" marker-end="url(#arrow)"/>

  <rect class="b gray" x="120" y="350" width="440" height="70" rx="8"/>
  <text class="th" x="340" y="382" text-anchor="middle">Hybrid CNN–LSTM</text>
  <text class="ts" x="340" y="402" text-anchor="middle">Conv1D → MaxPool → LSTM → Dropout → Dense</text>

  <line x1="340" y1="420" x2="340" y2="460" class="arr" marker-end="url(#arrow)"/>

  <rect class="b gray" x="120" y="460" width="440" height="70" rx="8"/>
  <text class="th" x="340" y="492" text-anchor="middle">15-day recursive forecast</text>
  <text class="ts" x="340" y="512" text-anchor="middle">Predict, slide window, repeat</text>

  <path d="M340 530 V552 H180 V570" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 530 V552 H500 V570" class="arr" marker-end="url(#arrow)"/>

  <rect class="b teal" x="40" y="570" width="280" height="80" rx="8"/>
  <text class="th" x="180" y="602" text-anchor="middle">Baseline forecast</text>
  <text class="ts" x="180" y="624" text-anchor="middle">Price only</text>
  <text class="ts" x="180" y="642" text-anchor="middle">RMSE 137</text>

  <rect class="b coral" x="360" y="570" width="280" height="80" rx="8"/>
  <text class="th" x="500" y="602" text-anchor="middle">Contrarian forecast</text>
  <text class="ts" x="500" y="624" text-anchor="middle">Price + 11 pattern channels</text>
  <text class="ts" x="500" y="642" text-anchor="middle">RMSE 101  (−26% vs baseline)</text>
</svg>
